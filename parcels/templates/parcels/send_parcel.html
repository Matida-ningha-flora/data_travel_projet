{% extends 'core/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h3>📦 Envoyer un colis</h3>
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6"><input type="text" name="receiver_name" class="form-control" placeholder="Destinataire" required></div>
                    <div class="col-md-6"><input type="text" name="receiver_phone" class="form-control" placeholder="Téléphone" required></div>
                    <div class="col-12"><textarea name="receiver_address" class="form-control" placeholder="Adresse" required></textarea></div>
                    <div class="col-md-3"><input type="text" name="departure_city" class="form-control" placeholder="Ville départ" value="Douala" required></div>
                    <div class="col-md-3"><input type="text" name="arrival_city" class="form-control" placeholder="Ville arrivée" required></div>
                    <div class="col-md-3"><input type="number" step="0.1" name="weight" class="form-control" placeholder="Poids (kg)" required></div>
                    <div class="col-md-3"><input type="number" name="price" class="form-control" placeholder="Prix (FCFA)" required></div>
                    <div class="col-12"><textarea name="description" class="form-control" placeholder="Description"></textarea></div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3">Enregistrer</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
